<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShieldBlock</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <header class="popup__header">
      <div class="popup__logo">🛡️</div>
      <div class="popup__title-group">
        <h1 class="popup__title">ShieldBlock</h1>
        <span class="popup__version">v1.0.0</span>
      </div>
      <button class="popup__power" id="btn-power" title="Ein/Aus">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18.36 6.64a9 9 0 1 1-12.73 0"/>
          <line x1="12" y1="2" x2="12" y2="12"/>
        </svg>
      </button>
    </header>

    <!-- Stats -->
    <div class="popup__stats">
      <div class="stat">
        <span class="stat__number" id="stat-session">0</span>
        <span class="stat__label">Diese Sitzung</span>
      </div>
      <div class="stat__divider"></div>
      <div class="stat">
        <span class="stat__number" id="stat-total">0</span>
        <span class="stat__label">Insgesamt blockiert</span>
      </div>
    </div>

    <!-- Toggles -->
    <div class="popup__toggles">
      <label class="toggle" id="toggle-ads">
        <div class="toggle__info">
          <span class="toggle__icon">🚫</span>
          <div>
            <span class="toggle__title">Werbung blockieren</span>
            <span class="toggle__desc">YouTube, Twitter, Reddit & mehr</span>
          </div>
        </div>
        <input type="checkbox" class="toggle__input" id="input-ads" checked>
        <span class="toggle__slider"></span>
      </label>

      <label class="toggle" id="toggle-trackers">
        <div class="toggle__info">
          <span class="toggle__icon">🔍</span>
          <div>
            <span class="toggle__title">Tracker blockieren</span>
            <span class="toggle__desc">Analytics, Pixel & Fingerprinting</span>
          </div>
        </div>
        <input type="checkbox" class="toggle__input" id="input-trackers" checked>
        <span class="toggle__slider"></span>
      </label>

      <label class="toggle" id="toggle-annoyances">
        <div class="toggle__info">
          <span class="toggle__icon">🍪</span>
          <div>
            <span class="toggle__title">Cookie-Banner entfernen</span>
            <span class="toggle__desc">Consent-Popups & Push-Spam</span>
          </div>
        </div>
        <input type="checkbox" class="toggle__input" id="input-annoyances" checked>
        <span class="toggle__slider"></span>
      </label>
    </div>

    <!-- Footer -->
    <footer class="popup__footer">
      <span class="popup__privacy-badge">
        <span class="popup__dot"></span>
        Deine Daten bleiben bei dir
      </span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
